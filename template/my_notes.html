{% extends 'base.html' %}
{% block content %}
<div class="home-container">
    <h2>📝 My Notes</h2>
    {% if notes %}
        <ul class="notes-list">
            {% for note in notes %}
            <li class="note-card">
                <h3>{{ note[1] }}</h3>
                <p>{{ note[2] }}</p>
                <div class="note-actions">
                    <a href="{{ url_for('edit_note', note_id=note[0]) }}" class="btn small edit">✏️ Edit</a>
                    <a href="{{ url_for('delete_note', note_id=note[0]) }}" class="btn small delete" onclick="return confirm('Delete this note?')">🗑️ Delete</a>
                    <a href="{{ url_for('duplicate_note', note_id=note[0]) }}" class="btn small duplicate">📄 Duplicate</a>
                </div>
            </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No notes yet. <a href="{{ url_for('home') }}">Add one</a>.</p>
    {% endif %}
</div>
{% endblock %}
